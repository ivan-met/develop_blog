spring:
  application:
    name: devblog
  datasource:
    url: jdbc:sqlite:devblog.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
    show-sql: false
    open-in-view: false

jwt:
  secret: ${JWT_SECRET:change-this-secret-in-production-must-be-at-least-256-bits-long!!}
  access-expiration: ${JWT_ACCESS_EXPIRATION:900000}      # 15 minutes in ms
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 days in ms

app:
  seed:
    admin:
      username: ${SEED_ADMIN_USERNAME:admin}
      email: ${SEED_ADMIN_EMAIL:admin@devblog.local}
      password: ${SEED_ADMIN_PASSWORD:Admin@1234}
    user:
      username: ${SEED_USER_USERNAME:user}
      email: ${SEED_USER_EMAIL:user@devblog.local}
      password: ${SEED_USER_PASSWORD:User@1234}
  security:
    bcrypt-strength: 12

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
